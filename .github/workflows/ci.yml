name: CI

# Auto-triggers disabled while the GitHub account suspension is being resolved
# (a suspended account makes actions/checkout fail with 403 on every run).
# Restore `push`/`pull_request` here once the account is reinstated.
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
