name: Supabase keep-alive

# Supabase free projects pause after 7 days idle. A query twice a week keeps it
# awake (the gap never exceeds 7 days). Needs the DATABASE_URL repo secret.

on:
  schedule:
    - cron: "0 6 * * 1,4" # Mon & Thu, 06:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure psql
        run: command -v psql >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client)
      - name: Ping database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: psql "$DATABASE_URL" -c "select 1;"
